################################################################################
# Judge0 Configuration — Nibras IDE sandbox
################################################################################

# Authentication — must match JUDGE0_AUTH_TOKEN in Nibras API .env
AUTHN_TOKEN=nibras-judge0-dev-token

# Redis
REDIS_HOST=redis
REDIS_PASSWORD=nibras-judge0-redis

# PostgreSQL
POSTGRES_HOST=db
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=nibras-judge0-pg

# Rails secret (dev default — change in production)
SECRET_KEY_BASE=nibras-judge0-secret-key-change-in-production

# Submission limits for playground runs
CPU_TIME_LIMIT=5
MAX_CPU_TIME_LIMIT=15
WALL_TIME_LIMIT=10
MEMORY_LIMIT=128000
MAX_MEMORY_LIMIT=512000
ENABLE_NETWORK=false

# Disable telemetry in local/dev deployments
JUDGE0_TELEMETRY_ENABLE=false
