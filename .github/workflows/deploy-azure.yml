name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'prisma/**'
      - 'Dockerfile.*'
      - '.github/workflows/deploy-azure.yml'
  workflow_dispatch:

# Only run one deploy at a time; cancel in-progress if a newer push arrives.
concurrency:
  group: deploy-azure
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ── Build + push three container images in parallel ────────────────────────
  # IMAGE_REPO is the lowercase form of `${{ github.repository }}` because Docker
  # image references must be lowercase, but GitHub preserves casing on org/repo.
  build-api:
    name: Build api image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase IMAGE_REPO
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-worker:
    name: Build worker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase IMAGE_REPO
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/worker:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase IMAGE_REPO
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/web:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/web:latest
          # Build-time public envs for Next.js. Set these as repo Variables
          # (Settings → Secrets and variables → Actions → Variables) before
          # the first deploy so the web bundle bakes in the right URLs.
          build-args: |
            NEXT_PUBLIC_NIBRAS_API_BASE_URL=${{ vars.NIBRAS_API_BASE_URL }}
            NEXT_PUBLIC_NIBRAS_WEB_BASE_URL=${{ vars.NIBRAS_WEB_BASE_URL }}
            NIBRAS_API_INTERNAL_URL=${{ vars.NIBRAS_API_INTERNAL_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ── Update three Container Apps to point at the new image SHA ──────────────
  # Auth: OIDC (recommended) via AZURE_CLIENT_ID + AZURE_TENANT_ID +
  # AZURE_SUBSCRIPTION_ID, or legacy AZURE_CREDENTIALS JSON blob.
  # Run scripts/setup-azure-gha-credentials.sh once to configure OIDC.
  deploy:
    name: Deploy to Container Apps
    needs: [build-api, build-worker, build-web]
    runs-on: ubuntu-latest
    if: ${{ vars.AZURE_RESOURCE_GROUP != '' }}
    steps:
      - name: Lowercase IMAGE_REPO
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Check deploy auth mode
        run: |
          MODE="${{ vars.AZURE_DEPLOY_AUTH }}"
          if [ "$MODE" != "oidc" ] && [ "$MODE" != "creds" ]; then
            echo "::error::Set repository variable AZURE_DEPLOY_AUTH to 'oidc' or 'creds' after running scripts/setup-azure-gha-credentials.sh. See docs/azure-deploy.md §5–6."
            exit 1
          fi

      - name: Azure login (OIDC)
        if: ${{ vars.AZURE_DEPLOY_AUTH == 'oidc' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure login (service principal secret)
        if: ${{ vars.AZURE_DEPLOY_AUTH == 'creds' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update nibras-api
        run: |
          az containerapp update \
            --name nibras-api \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/api:${{ github.sha }}

      - name: Update nibras-worker
        run: |
          az containerapp update \
            --name nibras-worker \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/worker:${{ github.sha }}

      - name: Update nibras-web
        run: |
          az containerapp update \
            --name nibras-web \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/web:${{ github.sha }}

      - name: Print live URLs
        run: |
          for app in nibras-api nibras-web; do
            URL=$(az containerapp show \
              --name $app \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --query 'properties.configuration.ingress.fqdn' -o tsv)
            echo "$app → https://$URL"
          done
