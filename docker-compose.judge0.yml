# Optional Judge0 CE stack for the in-browser IDE playground.
# Start with: docker compose -f docker-compose.judge0.yml up -d
# Requires Linux host with cgroups (native Linux, WSL2, or Docker Desktop).

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:
  judge0-server:
    image: judge0/judge0:latest
    volumes:
      - ./judge0/judge0.conf:/judge0.conf:ro
    ports:
      - '2358:2358'
    privileged: true
    <<: *default-logging
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  judge0-worker:
    image: judge0/judge0:latest
    command: ['./scripts/workers']
    volumes:
      - ./judge0/judge0.conf:/judge0.conf:ro
    privileged: true
    <<: *default-logging
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  db:
    image: postgres:16.2
    env_file: ./judge0/judge0.conf
    volumes:
      - judge0_postgres_data:/var/lib/postgresql/data
    <<: *default-logging
    restart: unless-stopped

  redis:
    image: redis:7.2.4
    command:
      [
        'bash',
        '-c',
        'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"',
      ]
    env_file: ./judge0/judge0.conf
    <<: *default-logging
    restart: unless-stopped

volumes:
  judge0_postgres_data:
